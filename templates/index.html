<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Traffic Volume Estimation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://cdn.vox-cdn.com/thumbor/vOARJfEKVTp6iMSZW3ExPn06TDM=/0x78:3000x1766/1600x900/cdn.vox-cdn.com/uploads/chorus_image/image/44219366/72499026.0.0.jpg');
            background-size: cover;
            background-position: center;
            font-family: Georgia, serif;
            color: black;
        }

        .Login {
            position: absolute;
            top: 30px;
            left: 30px;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 25px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: left;
        }

        h3 {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 6px;
            margin: 6px 0 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
            background-color: rgba(255, 255, 255, 0.9);
        }

        button {
            width: 100%;
            height: 35px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background-color: white;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="Login">
        <h1>Traffic Volume Estimation</h1>
        <form action="{{ url_for('predict') }}" method="post">
            <h3>Please enter the following details</h3>

            <label for="holiday">Holiday:</label>
            <select id="holiday" name="holiday">
                <option value="7">None</option>
                <option value="1">Columbus Day</option>
                <option value="10">Veterans Day</option>
                <option value="9">Thanksgiving Day</option>
                <option value="0">Christmas Day</option>
                <option value="6">New Year's Day</option>
                <option value="11">Washington's Birthday</option>
                <option value="5">Memorial Day</option>
                <option value="2">Independence Day</option>
                <option value="8">State Fair</option>
                <option value="3">Labor Day</option>
                <option value="4">Martin Luther King Jr Day</option>
            </select>

            <label>Temp:</label>
            <input type="number" name="temp" placeholder="temp" required />

            <label>Rain:</label>
            <input type="number" min="0" max="1" name="rain" placeholder="rain" required />

            <label>Snow:</label>
            <input type="number" min="0" max="1" name="snow" placeholder="snow" required />

            <label for="weather">Weather:</label>
            <select id="weather" name="weather">
                <option value="1">Clouds</option>
                <option value="0">Clear</option>
                <option value="6">Rain</option>
                <option value="2">Drizzle</option>
                <option value="5">Mist</option>
                <option value="4">Haze</option>
                <option value="3">Fog</option>
                <option value="10">Thunderstorm</option>
                <option value="8">Snow</option>
                <option value="9">Squall</option>
                <option value="7">Smoke</option>
            </select>

            <label>Year:</label>
            <input type="number" min="2012" max="2022" name="year" placeholder="year" required />

            <label>Month:</label>
            <input type="number" min="1" max="12" name="month" placeholder="month" required />

            <label>Day:</label>
            <input type="number" min="1" max="31" name="day" placeholder="day" required />

            <label>Hours:</label>
            <input type="number" min="0" max="23" name="hours" placeholder="hours" required />

            <label>Minutes:</label>
            <input type="number" min="0" max="59" name="minutes" placeholder="minutes" required />

            <label>Seconds:</label>
            <input type="number" min="0" max="59" name="seconds" placeholder="seconds" required />

            <button type="submit">Predict</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>
</html>
